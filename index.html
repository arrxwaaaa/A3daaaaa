const app = document.getElementById('app');
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modalContent');
const ROOMS = 'qaada_scroll_rooms';
let unsubscribe = null;
let room = null;
let screen = 'home';
let errorMsg = '';
let currentPlayerId = localStorage.getItem('qaada_player_id');
if(!currentPlayerId){ currentPlayerId = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); localStorage.setItem('qaada_player_id', currentPlayerId); }

let homeScrollHandler = null;

function setError(msg){
  errorMsg = msg || '';
  render();
}
function setScreen(next){
  screen = next;
  errorMsg = '';
  if(homeScrollHandler){
    app.removeEventListener('scroll', homeScrollHandler);
    homeScrollHandler = null;
  }
  app.scrollTop = 0;
  render();
}
function safeText(v){ return String(v ?? '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }
function codeGen(){ const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<6;i++) c+=chars[Math.floor(Math.random()*chars.length)]; return c; }
function shuffle(a){ const x=[...a]; for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [x[i],x[j]]=[x[j],x[i]];} return x; }
function getChar(id){ return CHARACTERS.find(c=>c.id===id); }
function isHost(){ return room && room.hostId === currentPlayerId; }
function me(){ return room?.players?.find(p=>p.id===currentPlayerId); }
function currentPlayer(){ return room?.players?.[room.currentTurnIndex || 0]; }
function currentPicker(){ return room?.players?.[room.characterPickIndex || 0]; }
function leftOf(players, idx){ return players[(idx - 1 + players.length) % players.length]; }
function rightOf(players, idx){ return players[(idx + 1) % players.length]; }
function scoreClass(n){ return n >= 0 ? 'zero' : 'neg'; }
function cardBackStyle(){ return `background-image: linear-gradient(rgba(74,77,158,.20),rgba(74,77,158,.20)), url('${CARD_BACK_IMAGE}');`; }
function cardTemplateStyle(points){ const img = points>=10?CARD_TEMPLATE_10:(points>=5?CARD_TEMPLATE_5:CARD_TEMPLATE_3); return `background-image:url('${img}')`; }
function bgStyle(img){ return `background-image:url('${img}')`; }
function isOnline(p){ return p?.isOnline && (!p.lastSeen || Date.now() - p.lastSeen < 45000); }
function lowestPlayers(players, count=3){ return [...(players||[])].sort((a,b)=>(a.score||0)-(b.score||0)).slice(0, Math.min(count, players.length)); }
const PUNISHMENT_CARDS = ACTION_CARDS.filter(c=>c.points===10).slice(0,3).map((c,i)=>({...c,type:'punishment',punishmentIndex:i}));
function roundTypeLabel(t){ return t === 'situation' ? 'موقف' : t === 'action' ? 'أكشن' : t === 'hasib' ? 'حاسب' : t === 'punishment' ? 'عقاب' : 'كارت'; }
function normalDeckKey(roundType){ return roundType === 'situation' ? 'situationDeck' : 'actionDeck'; }

function friendlyError(e){
  const msg = String(e?.message || e || '');
  if(msg.includes('permission-denied') || msg.includes('Missing or insufficient permissions')) return 'Firebase رافض الحفظ بسبب Rules. افتحي Firestore Rules وخليها تسمح بالقراءة والكتابة للرومات قبل التسليم.';
  if(msg.includes('unavailable') || msg.includes('network') || msg.includes('Failed to fetch')) return 'في مشكلة اتصال بالإنترنت أو Firebase. افتحي اللعبة من Chrome مع إنترنت ثابت أو ارفعيها على Hosting.';
  if(msg.includes('Firebase SDK')) return msg;
  return msg || 'حصل خطأ غير متوقع. افتحي Console لو محتاجة تفاصيل أكتر.';
}
function requireFirebase(){ if(!FIREBASE_READY){ setError('لازم تحطي Firebase config الأول عشان الرومات تشتغل Online.'); return false; } if(!FIREBASE_SDK_LOADED || !db){ setError('Firebase SDK مش متحمل. افتحي الملف من Chrome مع إنترنت أو ارفعيه على Hosting.'); return false; } return true; }
async function updateRoom(patch){
  if(!room?.roomCode) return false;
  if(!requireFirebase()) return false;
  try{
    await db.collection(ROOMS).doc(room.roomCode).update({...patch, updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
    return true;
  }catch(e){
    console.error('Room update failed:', e);
    setError(friendlyError(e));
    return false;
  }
}
function copyRoomCode(code){
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = code;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(code).catch(fallback);
  }else fallback();
}
function listen(code){
  if(unsubscribe) unsubscribe();
  unsubscribe = db.collection(ROOMS).doc(code).onSnapshot(snap=>{
    room = snap.exists ? snap.data() : null;
    if(!room){
      screen = 'home';
      localStorage.removeItem('qaada_room_code');
    }
    render();
  });
}

// ===================== 5) Room actions =====================
async function createRoomAction(){
  if(!requireFirebase()) return;
  const name = document.getElementById('hostName')?.value.trim();
  const maxPlayers = Number(document.getElementById('maxPlayers')?.value);
  if(!name) return setError('الاسم مطلوب');
  if(maxPlayers < 2 || maxPlayers > 12) return setError('عدد اللاعبين من 2 لـ 12');
  try{
    let code = codeGen();
    const ref = db.collection(ROOMS).doc(code);
    const decks = {
      situationDeck: shuffle(SITUATION_CARDS).map(c=>({...c,type:'situation',used:false})),
      actionDeck: shuffle(ACTION_CARDS).map(c=>({...c,type:'action',used:false})),
      hasibDeck: shuffle(HASIB_CARDS).map(c=>({...c,type:'hasib',used:false}))
    };
    const host = {id:currentPlayerId,name,isHost:true,characterId:null,score:0,failedCards:0,joinedAt:Date.now(),isOnline:true,lastSeen:Date.now(),leftDuringGame:false};
    const data = {roomCode:code,hostId:currentPlayerId,maxPlayers,players:[host],phase:'lobby',createdAt:Date.now(),updatedAt:Date.now(),instructionSeen:{},characterDeck:shuffle(CHARACTERS),chosenCharacterIds:[],characterPickIndex:0,currentRound:0,totalRounds:4,roundTypes:['situation','situation','action','action'],currentTurnIndex:0,roundTurnCount:0,currentCard:null,pendingNormalAfterHasib:false,drawnCards:[],activeEffects:[],...decks};
    await ref.set(data);
    localStorage.setItem('qaada_room_code',code);
    listen(code);
    startHeartbeat();
  }catch(e){
    console.error('Create room failed:', e);
    setError(friendlyError(e));
  }
}

async function joinRoomAction(){
  if(!requireFirebase()) return;
  const name = document.getElementById('joinName')?.value.trim();
  const code = document.getElementById('joinCode')?.value.trim().toUpperCase();
  if(!name) return setError('الاسم مطلوب');
  if(!code) return setError('الكود مطلوب');
  const ref = db.collection(ROOMS).doc(code);
  try{
    await db.runTransaction(async tx=>{
      const snap = await tx.get(ref);
      if(!snap.exists) throw new Error('الروم غير موجودة');
      const r = snap.data();
      const players = r.players || [];
      const existingIdx = players.findIndex(p=>p.id===currentPlayerId);
      if(existingIdx >= 0){
        const old = players[existingIdx];
        let newScore = old.score || 0;
        if(r.phase !== 'lobby' && old.isOnline === false && newScore > 0){ newScore = -Math.abs(newScore); }
        players[existingIdx] = {...old, name, score:newScore, isOnline:true, lastSeen:Date.now(), leftDuringGame:false, rejoinPenaltyApplied: newScore < (old.score||0)};
      } else {
        if(r.phase !== 'lobby') throw new Error('اللعبة بدأت بالفعل');
        if(players.length >= r.maxPlayers) throw new Error('الروم اكتملت');
        players.push({id:currentPlayerId,name,isHost:false,characterId:null,score:0,failedCards:0,joinedAt:Date.now(),isOnline:true,lastSeen:Date.now(),leftDuringGame:false});
      }
      tx.update(ref,{players,updatedAt:Date.now()});
    });
    localStorage.setItem('qaada_room_code',code);
    listen(code);
    startHeartbeat();
  }catch(e){ console.error('Join room failed:', e); setError(friendlyError(e)); }
}

async function leaveRoom(){
  if(!room) return;
  const code = room.roomCode;
  const ref = db.collection(ROOMS).doc(code);
  try{
    await db.runTransaction(async tx=>{
      const snap = await tx.get(ref); if(!snap.exists) return;
      const r = snap.data();
      let players = r.players || [];
      const gameStarted = r.phase && !['lobby','ended'].includes(r.phase);
      if(gameStarted){
        players = players.map(p=>{
          if(p.id !== currentPlayerId) return p;
          const currentScore = p.score || 0;
          return {...p, isOnline:false, lastSeen:Date.now(), leftDuringGame:true, score: currentScore>0 ? -Math.abs(currentScore) : currentScore};
        });
        tx.update(ref,{players,updatedAt:Date.now()});
        return;
      }
      players = players.filter(p=>p.id!==currentPlayerId);
      if(players.length === 0){ tx.delete(ref); return; }
      let hostId = r.hostId;
      if(hostId === currentPlayerId){ hostId = players[0].id; players = players.map((p,i)=>({...p,isHost:i===0})); }
      tx.update(ref,{players,hostId,updatedAt:Date.now()});
    });
  }catch(e){}
  if(unsubscribe) unsubscribe();
  room=null; localStorage.removeItem('qaada_room_code'); setScreen('home');
}

let heartbeatTimer = null;
function startHeartbeat(){
  if(heartbeatTimer) clearInterval(heartbeatTimer);
  heartbeatTimer = setInterval(async()=>{
    if(!room?.roomCode || !db) return;
    try{
      const ref = db.collection(ROOMS).doc(room.roomCode);
      await db.runTransaction(async tx=>{
        const snap = await tx.get(ref); if(!snap.exists) return;
        const r = snap.data();
        const players = (r.players||[]).map(p=>p.id===currentPlayerId?{...p,isOnline:true,lastSeen:Date.now()}:p);
        tx.update(ref,{players,updatedAt:Date.now()});
      });
    }catch(e){}
  }, 15000);
}

async function startGame(){ if(!isHost()) return; if(room.players.length < 2) return setError('استنى باقي اللاعبين'); await updateRoom({phase:'intro_character',characterPickIndex:0,chosenCharacterIds:[]}); }
async function beginCharacterSelection(){ if(!isHost()) return; await updateRoom({phase:'character_selection'}); }
async function beginSituations(){ if(!isHost()) return; await updateRoom({phase:'playing',currentRound:0,currentTurnIndex:0,roundTurnCount:0,currentCard:null,pendingNormalAfterHasib:false}); }
async function beginActions(){ if(!isHost()) return; await updateRoom({phase:'playing',currentRound:2,currentTurnIndex:0,roundTurnCount:0,currentCard:null,pendingNormalAfterHasib:false}); }
async function beginPunishment(){ if(!isHost()) return; const losers = lowestPlayers(room.players,3); await updateRoom({phase:'punishment',punishmentPlayers:losers.map(p=>p.id),punishmentIndex:0,punishmentCards:PUNISHMENT_CARDS}); }

async function pickCharacter(index){
  if(!room) return;
  const picker = currentPicker();
  if(!picker || picker.id !== currentPlayerId) return setError('مش دورك دلوقتي');
  const char = room.characterDeck[index];
  if(!char || (room.chosenCharacterIds||[]).includes(char.id)) return;
  const ref = db.collection(ROOMS).doc(room.roomCode);
  await db.runTransaction(async tx=>{
    const snap = await tx.get(ref); const r = snap.data();
    const pickerNow = r.players[r.characterPickIndex || 0];
    if(!pickerNow || pickerNow.id !== currentPlayerId) throw new Error('مش دورك دلوقتي');
    const selected = r.characterDeck[index];
    if(!selected || (r.chosenCharacterIds||[]).includes(selected.id)) throw new Error('الشخصية اتاخدت');
    const players = r.players.map(p=>p.id===currentPlayerId ? {...p,characterId:selected.id} : p);
    const chosenCharacterIds = [...(r.chosenCharacterIds||[]), selected.id];
    const allChosen = players.every(p=>p.characterId);
    tx.update(ref,{players,chosenCharacterIds,characterPickIndex: allChosen ? r.characterPickIndex : (r.characterPickIndex||0)+1,phase: allChosen ? 'intro_situations' : 'character_selection',currentRound:0,currentTurnIndex:0,roundTurnCount:0,currentCard:null,pendingNormalAfterHasib:false,updatedAt:Date.now()});
  }).catch(e=>setError(e.message));
}


// ===================== 6) Gameplay actions =====================
async function drawCard(){
  if(!room) return;
  const cp = currentPlayer();
  if(!cp || cp.id !== currentPlayerId) return setError('مش دورك دلوقتي');
  const ref = db.collection(ROOMS).doc(room.roomCode);
  await db.runTransaction(async tx=>{
    const snap = await tx.get(ref); const r = snap.data();
    const players = r.players || [];
    const current = players[r.currentTurnIndex || 0];
    if(!current || current.id !== currentPlayerId) throw new Error('مش دورك دلوقتي');
    if(r.currentCard) throw new Error('في كارت مفتوح بالفعل');
    const roundType = r.roundTypes[r.currentRound] || 'situation';
    let update = {};
    let card = null;
    let isBonusHasib = false;

    const hasibAvailable = (r.hasibDeck||[]).filter(c=>!c.used);
    const shouldHasib = !r.pendingNormalAfterHasib && hasibAvailable.length && Math.random() < 0.22;
    if(shouldHasib){
      card = hasibAvailable[Math.floor(Math.random()*hasibAvailable.length)];
      isBonusHasib = true;
      update.hasibDeck = (r.hasibDeck||[]).map(c=>c.id===card.id?{...c,used:true}:c);
    }else{
      const key = normalDeckKey(roundType);
      const available = (r[key]||[]).filter(c=>!c.used);
      if(!available.length) throw new Error('مفيش كروت متاحة');
      card = available[Math.floor(Math.random()*available.length)];
      update[key] = (r[key]||[]).map(c=>c.id===card.id?{...c,used:true}:c);
      update.pendingNormalAfterHasib = false;
    }
    update.currentCard = {...card, revealed:true, isBonusHasib};
    update.drawnCards = [...(r.drawnCards||[]), card.id];
    update.updatedAt = Date.now();
    tx.update(ref, update);
  }).catch(e=>setError(e.message));
}

function applyScore(players, playerId, delta, failInc=false){
  return players.map(p=>p.id===playerId?{...p,score:(p.score||0)+delta,failedCards:(p.failedCards||0)+(failInc?1:0)}:p);
}
function applyNegativeCopyEffects(r, players, playerId, delta){
  if(delta >= 0) return players;
  const effects = (r.activeEffects||[]).filter(e=>e.effectType==='copy_negative_to_left' && e.playerId===playerId);
  let out = players;
  effects.forEach(e=>{ out = applyScore(out,e.targetPlayerId,delta,false); });
  return out;
}
function decrementEffectsForPlayer(effects, playerId){
  return effects.map(e=>{
    if(e.playerId !== playerId) return e;
    if(e.remainingTurns >= 900) return e;
    return {...e, remainingTurns:e.remainingTurns-1};
  }).filter(e=>e.remainingTurns > 0);
}

async function resolveCard(success){
  if(!room?.currentCard) return;
  const cp = currentPlayer();
  if(!cp || cp.id !== currentPlayerId) return setError('مش دورك دلوقتي');
  const targetEl = document.getElementById('targetPlayer');
  const targetId = targetEl ? targetEl.value : null;
  const ref = db.collection(ROOMS).doc(room.roomCode);
  await db.runTransaction(async tx=>{
    const snap = await tx.get(ref); const r = snap.data();
    const card = r.currentCard;
    const players = r.players || [];
    const idx = r.currentTurnIndex || 0;
    const current = players[idx];
    if(!current || current.id !== currentPlayerId) throw new Error('مش دورك دلوقتي');
    if(!card) throw new Error('مفيش كارت مفتوح');
    let updatedPlayers = [...players];
    let activeEffects = [...(r.activeEffects||[])];
    if(success){
      const plus = card.points || 0;
      if(plus !== 0){ updatedPlayers = applyScore(updatedPlayers,currentPlayerId,plus,false); }
      if(card.type === 'hasib'){
        if(card.effectType === 'swap_scores'){
          if(!targetId) throw new Error('اختار لاعب للتبديل');
          const a = updatedPlayers.findIndex(p=>p.id===currentPlayerId);
          const b = updatedPlayers.findIndex(p=>p.id===targetId);
          if(a >= 0 && b >= 0){ const s = updatedPlayers[a].score||0; updatedPlayers[a] = {...updatedPlayers[a],score:updatedPlayers[b].score||0}; updatedPlayers[b] = {...updatedPlayers[b],score:s}; }
        }else if(card.effectType === 'copy_negative_to_left'){
          const left = leftOf(players,idx);
          activeEffects.push({id:'eff_'+Date.now(),playerId:currentPlayerId,targetPlayerId:left.id,title:card.title,effectType:card.effectType,remainingTurns:999,penalty:card.points,text:card.text});
        }else if(['silence','vlog','translate','question_only','lag','hashtag','mirror','paranoia','statue'].includes(card.effectType)){
          activeEffects.push({id:'eff_'+Date.now(),playerId:currentPlayerId,targetPlayerId:currentPlayerId,title:card.title,effectType:card.effectType,remainingTurns:card.duration||3,penalty:card.points,text:card.text});
        }
      }
    }else{
      updatedPlayers = updatedPlayers.map(p=>p.id===currentPlayerId?{...p,failedCards:(p.failedCards||0)+1}:p);
      if(card.type === 'hasib'){
        const delta = -(card.points || 0);
        if(delta !== 0){ updatedPlayers = applyScore(updatedPlayers,currentPlayerId,delta,false); updatedPlayers = applyNegativeCopyEffects(r,updatedPlayers,currentPlayerId,delta); }
      }
    }
    if(card.isBonusHasib){
      tx.update(ref,{players:updatedPlayers,activeEffects,currentCard:null,pendingNormalAfterHasib:true,updatedAt:Date.now()});
      return;
    }
    activeEffects = decrementEffectsForPlayer(activeEffects,currentPlayerId);
    const nextTurn = (idx + 1) % players.length;
    let nextRound = r.currentRound || 0;
    let roundTurnCount = (r.roundTurnCount || 0) + 1;
    let phase = 'playing';
    if(roundTurnCount >= players.length){
      nextRound += 1;
      roundTurnCount = 0;
      if(nextRound === 2) phase = 'intro_actions';
      if(nextRound >= (r.totalRounds || 4)) phase = 'intro_punishment';
    }
    tx.update(ref,{players:updatedPlayers,activeEffects,currentCard:null,pendingNormalAfterHasib:false,currentTurnIndex:nextTurn,currentRound:nextRound,roundTurnCount,phase,updatedAt:Date.now()});
  }).catch(e=>setError(e.message));
}

async function breakEffect(effectId){
  if(!room) return;
  if(!requireFirebase()) return;
  const effect = (room.activeEffects||[]).find(e=>e.id===effectId);
  if(!effect) return;
  if(!isHost() && effect.playerId !== currentPlayerId) return setError('المضيف أو صاحب الحكم بس يقدر يسجل كسر الحكم');
  const ref = db.collection(ROOMS).doc(room.roomCode);
  try{
    await db.runTransaction(async tx=>{
      const snap = await tx.get(ref); const r = snap.data();
      const e = (r.activeEffects||[]).find(x=>x.id===effectId); if(!e) return;
      const players = applyScore(r.players||[], e.playerId, -(e.penalty||3), true);
      const activeEffects = (r.activeEffects||[]).filter(x=>x.id!==effectId);
      tx.update(ref,{players,activeEffects,updatedAt:Date.now()});
    });
  }catch(e){
    console.error('Break effect failed:', e);
    setError(friendlyError(e));
  }
}

async function resetGame(){ if(!isHost()) return; const decks={situationDeck:shuffle(SITUATION_CARDS).map(c=>({...c,type:'situation',used:false})),actionDeck:shuffle(ACTION_CARDS).map(c=>({...c,type:'action',used:false})),hasibDeck:shuffle(HASIB_CARDS).map(c=>({...c,type:'hasib',used:false}))}; await updateRoom({phase:'lobby',players:room.players.map(p=>({...p,characterId:null,score:0,failedCards:0,isOnline:p.id===currentPlayerId ? true : p.isOnline,lastSeen:p.id===currentPlayerId ? Date.now() : p.lastSeen,leftDuringGame:false,rejoinPenaltyApplied:false})),currentRound:0,currentTurnIndex:0,roundTurnCount:0,currentCard:null,activeEffects:[],chosenCharacterIds:[],punishmentPlayers:[],punishmentIndex:0,punishmentCards:[],pendingNormalAfterHasib:false,...decks}); }

async function completePunishment(){
  if(!room) return;
  const ids = room.punishmentPlayers || [];
  const idx = room.punishmentIndex || 0;
  const currentLoserId = ids[idx];
  if(currentPlayerId !== currentLoserId && !isHost()) return setError('العقاب يتسجل من اللاعب أو المضيف');
  if(idx + 1 >= ids.length){ await updateRoom({phase:'ended',updatedAt:Date.now()}); }
  else { await updateRoom({punishmentIndex:idx+1,updatedAt:Date.now()}); }
}

  document.body.classList.remove('home-mode');
  app.classList.remove('home-mode');
  if(!FIREBASE_READY){
    app.innerHTML = `<div class="screen center"><div class="logo-mark">ق</div><h1 class="brand text-3xl font-black">قعدة سكرول</h1><div class="notice bad text-right">لازم تحطي Firebase config الأول في أول الكود مكان YOUR_API_KEY عشان إنشاء الرومات واللعب Online يشتغل.</div><p class="sub text-sm">بعد ما تضيفي config، ارفعي الملف على استضافة أو افتحيه من سيرفر محلي.</p></div>`;
    return;
  }
  if(room){
    if(room.phase==='lobby') return renderLobby();
    if(room.phase==='intro_character') return renderIntro('character');
    if(room.phase==='character_selection') return renderCharacterSelection();
    if(room.phase==='intro_situations') return renderIntro('situations');
    if(room.phase==='intro_actions') return renderIntro('actions');
    if(room.phase==='playing') return renderGameplay();
    if(room.phase==='intro_punishment') return renderIntro('punishment');
    if(room.phase==='punishment') return renderPunishment();
    if(room.phase==='ended') return renderEnd();
  }
  if(screen==='create') return renderCreate();
  if(screen==='join') return renderJoin();
  return renderHome();
}

function renderPunishment(){
  const ids = room.punishmentPlayers || [];
  const idx = room.punishmentIndex || 0;
  const player = (room.players||[]).find(p=>p.id===ids[idx]);
  const card = (room.punishmentCards||PUNISHMENT_CARDS)[idx] || PUNISHMENT_CARDS[idx] || PUNISHMENT_CARDS[0];
  app.innerHTML = `<div class="screen game-bg" style="${bgStyle(GAME_BG_IMAGE)}"><div class="topbar"><span class="pill">عقاب ${idx+1}/${ids.length}</span><span class="tiny">إجباري</span></div><div class="punishment-card mb-4"><h2 class="text-2xl font-black mb-2">${safeText(player?.name||'لاعب')} عليه العقاب</h2><p class="sub" style="color:#e5e7eb">${safeText(card?.title||'كارت عقاب')}</p><div class="game-card-wrap mt-4"><div class="face front with-template" style="position:relative;aspect-ratio:5/7;${cardTemplateStyle(10)}">${cardFront({...card,type:'punishment',points:10})}</div></div></div><div class="box mb-4"><b>ترتيب أقل نقط:</b><div class="scoreboard mt-3">${lowestPlayers(room.players,3).map(p=>`<div class="score-row"><b>${safeText(p.name)}</b><span class="score ${scoreClass(p.score||0)}">${p.score||0}</span></div>`).join('')}</div></div>${(currentPlayerId===player?.id||isHost())?'<button class="btn btn-success" onclick="completePunishment()">تم تنفيذ العقاب</button>':'<div class="notice ok text-center">مستنيين تنفيذ العقاب</div>'}</div>`;
}

function renderEnd(){
  const sorted=[...(room.players||[])].sort((a,b)=>(b.score||0)-(a.score||0)); const winner=sorted[0]; const loser=sorted[sorted.length-1];
  app.innerHTML = `<div class="screen center"><div class="winner-crown">👑</div><h2 class="brand text-3xl font-black">اللعبة خلصت</h2><div class="box w-full"><p class="sub mb-2">الفائز: <b>${safeText(winner?.name||'')}</b></p><p class="tiny">أقل لاعب في النقط: ${safeText(loser?.name||'')}</p><div class="scoreboard mt-4">${sorted.map((p,i)=>`<div class="score-row ${i===0?'current':''}"><b>${i+1}- ${safeText(p.name)}</b><span class="score ${scoreClass(p.score||0)}">${p.score||0}</span></div>`).join('')}</div></div>${isHost()?'<button class="btn btn-primary" onclick="resetGame()">العبوا تاني</button>':''}<button class="btn btn-secondary" onclick="leaveRoom()">رجوع للرئيسية</button></div>`;
}

Object.assign(window, {
  setScreen, copyRoomCode, createRoomAction, joinRoomAction, leaveRoom, startGame,
  beginCharacterSelection, beginSituations, beginActions, beginPunishment,
  pickCharacter, drawCard, resolveCard, breakEffect, completePunishment,
  resetGame
});

const savedRoom = localStorage.getItem('qaada_room_code');
if(savedRoom && FIREBASE_READY && FIREBASE_SDK_LOADED && db){ listen(savedRoom); startHeartbeat(); }
render();
</script>
</body>
</html>
